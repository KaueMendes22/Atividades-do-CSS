<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <title>CSS Flag Project</title>
  <style>
    .flag {
      width: 900px;
      height: 600px;
      background-color: #ce1126;
      position: relative;
    }

    .flag > p {
      margin: 0;
      color: #ffffff;
      font-size: 5rem;
      text-align: center;
    }

    .flag > div {
      width: 900px;
      height: 300px;
      background-color: #002868;
      position: absolute;
      top: 150px;
    }

    .flag > div > div {
      width: 200px;
      height: 200px;
      background-color: #ffffff;
      border-radius: 50%;
      position: relative;
      top: 50px;
      left: 350px;
    }

    .flag > div > div > p {
      margin: 0;
      color: #000000;
      font-size: 5rem;
      text-align: center;
      line-height: 200px;
    }
  </style>
</head>

<body>
  <div class="flag">
    <p>The Flag</p>
    <div>
      <div>
        <p>of Laos</p>
      </div>
    </div>
  </div>
</body>

</html>
